<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve Your Ring - Remembrance Rings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">Remembrance Rings</a>
            <nav class="nav">
                <a href="index.html#collection" class="nav-link">Collection</a>
                <a href="index.html#meaning" class="nav-link">Meaning</a>
                <a href="index.html#sizing" class="nav-link">Sizing</a>
                <a href="order.html" class="nav-link">Order</a>
            </nav>
        </div>
    </header>

    <!-- ORDER SECTION -->
    <section class="order-section">
        <div class="container">
            <div class="order-header">
                <h1 class="order-title">Reserve Your Ring</h1>
                <p class="order-subtitle">Fill out the form below and we'll follow up to confirm size, availability, and pickup/drop off options.</p>
                <p class="order-note">Available for pickup or drop off in the Utah Valley area.</p>
            </div>

            <div class="order-form-wrapper">
                <form action="https://formsubmit.co/remembrancerings1@gmail.com" method="POST" class="order-form">
                    <!-- Hidden FormSubmit fields -->
                    <input type="hidden" name="_subject" value="New Remembrance Rings Order Request">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" value="https://romansoldier09-alt.github.io/remembrance-rings/thank-you.html">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="full-name">Full Name</label>
                            <input type="text" id="full-name" name="Full Name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="Email" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="Phone Number" required>
                        </div>
                        <div class="form-group">
                            <label for="ring-select">Ring Selection</label>
                            <select id="ring-select" name="Ring Selection" required>
                                <option value="">Select a ring</option>
                                <option value="Child of God">Child of God</option>
                                <option value="Faith in Every Footstep">Faith in Every Footstep</option>
                                <option value="Mexico Temple Ring">Mexico Temple Ring</option>
                                <option value="Salt Lake Temple Ring">Salt Lake Temple Ring</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="ring-size">Ring Size</label>
                            <select id="ring-size" name="Ring Size" required>
                                <option value="">Select a size</option>
                                <option value="6">6</option>
                                <option value="6.5">6.5</option>
                                <option value="7">7</option>
                                <option value="7.5">7.5</option>
                                <option value="8">8</option>
                                <option value="8.5">8.5</option>
                                <option value="9">9</option>
                                <option value="9.5">9.5</option>
                                <option value="10">10</option>
                                <option value="10.5">10.5</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="delivery">Delivery Preference</label>
                            <select id="delivery" name="Delivery Preference" required>
                                <option value="">Select delivery option</option>
                                <option value="Pickup in Utah Valley">Pickup in Utah Valley</option>
                                <option value="Drop off in Utah Valley">Drop off in Utah Valley</option>
                                <option value="Shipping">Shipping</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="Message" rows="4" placeholder="Any additional questions or requests..."></textarea>
                    </div>

                    <div class="form-submit">
                        <button type="submit" class="btn btn-primary btn-full">Send Order Request</button>
                    </div>
                </form>
            </div>

            <div class="back-link">
                <a href="index.html" class="btn btn-secondary">&larr; Back to Home</a>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">&copy; 2026 Remembrance Rings. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
